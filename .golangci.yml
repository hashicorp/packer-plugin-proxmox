version: "2"

linters:
  default: none
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unconvert
    - unused
  exclusions:
    paths:
      - ".*\\.hcl2spec\\.go$"
    rules:
      # Exclude gosimple bool checks (now part of staticcheck in v2)
      - linters:
          - staticcheck
        text: "S(1002|1008|1021)"
      # Exclude failing staticchecks for now
      - linters:
          - staticcheck
        text: "SA(1006|1019|4006|4010|4017|5007|6005|9004):"
      # Exclude lll issues for long lines with go:generate
      - linters:
          - lll
        source: "^//go:generate "
      - linters:
          - errcheck
        path: ".*_test\\.go"

formatters:
  enable:
    - goimports
  exclusions:
    paths:
      - ".*\\.hcl2spec\\.go$"

issues:
  max-issues-per-linter: 0
  max-same-issues: 0

run:
  concurrency: 4
  timeout: 10m
