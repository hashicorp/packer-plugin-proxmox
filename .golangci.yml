version: "2"

linters:
  enable:
    - asasalint
    - asciicheck
    - bidichk
    - decorder
    - dupword
    - govet
    - ineffassign
    - misspell
    - nilerr
    - reassign
    - staticcheck
    - unconvert
    - unused
  settings:
    errcheck:
      check-type-assertions: false
      check-blank: false
    staticcheck:
      checks: ["all", "-SA4006", "-ST1000", "-ST1003", "-ST1005", "-ST1012", "-ST1016", "-ST1020", "-ST1021", "-ST1022", "-QF1001", "-QF1004", "-QF1008", "-QF1012"]
  exclusions:
    generated: lax
    paths:
      - ".*\\.hcl2spec\\.go$"

run:
  concurrency: 4
  timeout: 10m
  issues-exit-code: 1
  tests: true

formatters:
  enable:
    - gofmt
    - goimports
  exclusions:
    generated: lax
    paths:
      - ".*\\.hcl2spec\\.go$"
